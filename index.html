<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jetway Activation System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #111118;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 50px #00ffcc22;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .sub {
            color: #668877;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a22;
            border: 1px solid #00ffcc44;
            border-radius: 6px;
            color: #00ffcc;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }
        input:focus {
            border-color: #00ffcc;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00ffcc;
            color: #0a0a0f;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        button:hover {
            background: #00ddbb;
        }
        .status {
            margin-top: 18px;
            font-size: 14px;
            min-height: 30px;
            color: #ff6666;
        }
        .status.success { color: #00ff88; }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #334455;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">✈️ JETWAY SYSTEM</div>
    <div class="sub">Активация через ключ доступа</div>

    <input type="text" id="keyInput" placeholder="ВВЕДИ КЛЮЧ ДОСТУПА" autofocus>
    <button onclick="activate()">АКТИВИРОВАТЬ</button>

    <div id="status" class="status">Ожидание ввода...</div>
    <div class="footer">https://t.me/qpBypass</div>
</div>

<script>
    const SECRET_KEY = "JetwayOhnoway";

    function activate() {
        const input = document.getElementById('keyInput').value.trim();
        const status = document.getElementById('status');

        if (!input) {
            status.textContent = "❌ Введи ключ, блять.";
            status.className = "status";
            return;
        }

        if (input === SECRET_KEY) {
            status.textContent = "✅ АКТИВАЦИЯ УСПЕШНА! Токен: JETWAY-ACTIVE-2026";
            status.className = "status success";
            localStorage.setItem('jetway_token', 'JETWAY-ACTIVE-2026');
        } else {
            status.textContent = "❌ НЕВЕРНЫЙ КЛЮЧ. Попробуй ещё.";
            status.className = "status";
        }
    }

    // Проверяем, активирован ли уже
    window.onload = function() {
        const token = localStorage.getItem('jetway_token');
        if (token === 'JETWAY-ACTIVE-2026') {
            document.getElementById('status').textContent = "✅ СИСТЕМА УЖЕ АКТИВИРОВАНА";
            document.getElementById('status').className = "status success";
        }
    }
</script>

</body>
</html>
