<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jetway License Activation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #111118;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 40px;
            width: 420px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a22;
            border: 1px solid #00ffcc44;
            border-radius: 6px;
            color: #00ffcc;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00ffcc;
            color: #0a0a0f;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .status { margin-top: 15px; font-size: 14px; }
        .success { color: #00ff88; }
        .error { color: #ff6666; }
        .footer { margin-top: 20px; font-size: 12px; color: #334455; }
    </style>
</head>
<body>
<div class="container">
    <h2>✈️ JETWAY LICENSE</h2>
    <p style="color:#668877;margin-bottom:20px;">Введи ключ для активации системы</p>
    <input type="text" id="keyInput" placeholder="ВВЕДИ КЛЮЧ">
    <button onclick="activate()">АКТИВИРОВАТЬ</button>
    <div id="status" class="status">Ожидание...</div>
    <div class="footer">https://t.me/qpBypass</div>
</div>
<script>
    const validKeys = ["JetwayOhnoway", "DEMO-2026", "QP-BYPASS"];

    function activate() {
        const input = document.getElementById('keyInput').value.trim();
        const status = document.getElementById('status');

        if (!input) {
            status.textContent = "❌ Введи ключ!";
            status.className = "status error";
            return;
        }

        if (validKeys.includes(input)) {
            status.textContent = "✅ АКТИВАЦИЯ УСПЕШНА! ТОКЕН: JETWAY-ACTIVE";
            status.className = "status success";
            localStorage.setItem('jetway_token', 'JETWAY-ACTIVE');
        } else {
            status.textContent = "❌ НЕВЕРНЫЙ КЛЮЧ";
            status.className = "status error";
        }
    }
</script>
</body>
</html>
